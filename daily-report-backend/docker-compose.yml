version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: daily-report-db
    environment:
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: engineerlog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
